name: Deploy Admin API

on:
  push:
    branches: [main]
    paths:
      - 'saas-api/**'
      - '.github/workflows/deploy-api.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Login to Aliyun ACR
        uses: docker/login-action@v4
        with:
          registry: crpi-zkwf5wpoov74u7f3.cn-beijing.personal.cr.aliyuncs.com
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: ./saas-api
          file: ./saas-api/apps/admin-api/Dockerfile
          push: true
          tags: |
            crpi-zkwf5wpoov74u7f3.cn-beijing.personal.cr.aliyuncs.com/zygdemo/saas-admin-api:latest
            crpi-zkwf5wpoov74u7f3.cn-beijing.personal.cr.aliyuncs.com/zygdemo/saas-admin-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.2.5
        env:
          ACR_USER: ${{ secrets.ACR_USERNAME }}
          ACR_PASS: ${{ secrets.ACR_PASSWORD }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          port: ${{ secrets.SERVER_PORT }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 10m
          envs: ACR_USER,ACR_PASS
          script: |
            set -e
            echo "$ACR_PASS" | docker login crpi-zkwf5wpoov74u7f3-vpc.cn-beijing.personal.cr.aliyuncs.com -u "$ACR_USER" --password-stdin
            cd /opt/saas/api
            docker compose pull api
            docker compose up -d postgres redis
            echo "===== 执行 Prisma migration ====="
            # 标记之前失败的 20260723200000_add_food_tenant_cascade 迁移为已回滚，避免阻塞后续 deploy
            docker compose run --rm --no-deps api sh -c "cd /app/apps/admin-api && npx prisma migrate resolve --rolled-back 20260723200000_add_food_tenant_cascade --schema prisma/schema.prisma" || true
            docker compose run --rm --no-deps api sh -c "cd /app/apps/admin-api && npx prisma migrate deploy --schema prisma/schema.prisma"
            echo "===== 同步生产菜单/角色菜单/按钮权限 ====="
            docker compose run --rm --no-deps api sh -c "cd /app/apps/admin-api && npx tsx prisma/scripts/migrate-roles-menus.ts"
            docker compose up -d api
            echo "===== 容器状态 ====="
            docker ps | grep saas
            docker image prune -f
