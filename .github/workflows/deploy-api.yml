name: Deploy Admin API

on:
push:
branches: [main]
paths:
- 'saas-api/**'
- '.github/workflows/deploy-api.yml'
workflow_dispatch:

env:
ACR_REGISTRY: crpi-zkwf5wpoov74u7f3.cn-beijing.personal.cr.aliyuncs.com
IMAGE_NAME: zygdemo/saas-admin-api

jobs:
build-and-deploy:
runs-on: ubuntu-latest

steps:
- uses: actions/checkout@v4

- name: Login to Aliyun ACR
uses: docker/login-action@v3
with:
registry: ${{ env.ACR_REGISTRY }}
username: ${{ secrets.ACR_USERNAME }}
password: ${{ secrets.ACR_PASSWORD }}

- name: Set up Docker Buildx
uses: docker/setup-buildx-action@v3

- name: Build and push image
uses: docker/build-push-action@v5
with:
context: ./saas-api
file: ./saas-api/apps/admin-api/Dockerfile
push: true
tags: |
${{ env.ACR_REGISTRY }}/${{ env.IMAGE_NAME }}:latest
${{ env.ACR_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
cache-from: type=gha
cache-to: type=gha,mode=max

- name: Deploy to server
uses: appleboy/ssh-action@v1
env:
ACR_USER: ${{ secrets.ACR_USERNAME }}
ACR_PASS: ${{ secrets.ACR_PASSWORD }}
with:
host: ${{ secrets.SERVER_HOST }}
username: ${{ secrets.SERVER_USER }}
port: ${{ secrets.SERVER_PORT }}
key: ${{ secrets.SERVER_SSH_KEY }}
command_timeout: 10m
envs: ACR_USER,ACR_PASS
script: |
set -e
echo "$ACR_PASS" | docker login crpi-zkwf5wpoov74u7f3-vpc.cn-beijing.personal.cr.aliyuncs.com -u "$ACR_USER" --password-stdin
cd /opt/saas/api
docker compose pull api
docker compose up -d
echo "===== 容器状态 ====="
docker ps | grep saas
docker image prune -f
