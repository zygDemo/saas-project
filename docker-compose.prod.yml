services:
  web:
    build:
      context: .
      dockerfile: saas-web/Dockerfile
      args:
        VITE_BASE_URL: /saas/
        VITE_API_URL: /saas
    container_name: saas-web
    restart: unless-stopped
    depends_on:
      - admin-api
    ports:
      - "127.0.0.1:${SAAS_WEB_PORT:-8080}:80"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:80/saas/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  admin-api:
    build:
      context: ./saas-api
      dockerfile: apps/admin-api/Dockerfile
    container_name: saas-admin-api
    restart: unless-stopped
    env_file:
      - ./saas-api/apps/admin-api/env/.env.production
    environment:
      NODE_ENV: production
      PORT: 3001
      API_PREFIX: /saas/api
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-https://www.yugui.store}
      DATABASE_URL: postgresql://postgres:***@postgres:5432/saas_prod?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD:
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "3001"
    ports:
      - "127.0.0.1:${SAAS_API_PORT:-3001}:3001"
    volumes:
      - /opt/saas/uploads:/app/apps/admin-api/uploads
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:3001/saas/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: saas-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      POSTGRES_DB: saas_prod
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d saas_prod"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: saas-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
