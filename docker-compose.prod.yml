services:
  web:
    build:
      context: ./saas-web
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /
    container_name: saas-web
    restart: unless-stopped
    depends_on:
      - admin-api
    ports:
      - "80:80"

  admin-api:
    build:
      context: ./saas-api
      dockerfile: apps/admin-api/Dockerfile
    container_name: saas-admin-api
    restart: unless-stopped
    env_file:
      - ./saas-api/apps/admin-api/env/.env.production
    environment:
      NODE_ENV: production
      PORT: 3000
      API_PREFIX: api
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-change-me}@postgres:5432/saas_prod?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD:
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "3000"

  postgres:
    image: postgres:16-alpine
    container_name: saas-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      POSTGRES_DB: saas_prod
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d saas_prod"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: saas-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
