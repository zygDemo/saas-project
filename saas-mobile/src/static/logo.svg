<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0d4e"/>
      <stop offset="50%" style="stop-color:#2d1b8e"/>
      <stop offset="100%" style="stop-color:#5240FE"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FCE598"/>
      <stop offset="40%" style="stop-color:#D4AF37"/>
      <stop offset="100%" style="stop-color:#A8821C"/>
    </linearGradient>
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00F0FF"/>
      <stop offset="100%" style="stop-color:#00A0FF"/>
    </linearGradient>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="nodeGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <mask id="roundMask">
      <rect x="0" y="0" width="512" height="512" rx="112" ry="112" fill="white"/>
    </mask>
  </defs>

  <g mask="url(#roundMask)">
    <!-- 背景 -->
    <rect x="0" y="0" width="512" height="512" fill="url(#bgGrad)"/>

    <!-- 网格线 -->
    <g opacity="0.06" stroke="#00F0FF" stroke-width="1">
      <line x1="0" y1="64" x2="512" y2="64"/><line x1="0" y1="128" x2="512" y2="128"/>
      <line x1="0" y1="192" x2="512" y2="192"/><line x1="0" y1="256" x2="512" y2="256"/>
      <line x1="0" y1="320" x2="512" y2="320"/><line x1="0" y1="384" x2="512" y2="384"/>
      <line x1="0" y1="448" x2="512" y2="448"/>
      <line x1="64" y1="0" x2="64" y2="512"/><line x1="128" y1="0" x2="128" y2="512"/>
      <line x1="192" y1="0" x2="192" y2="512"/><line x1="256" y1="0" x2="256" y2="512"/>
      <line x1="320" y1="0" x2="320" y2="512"/><line x1="384" y1="0" x2="384" y2="512"/>
      <line x1="448" y1="0" x2="448" y2="512"/>
    </g>

    <!-- 四角电路 -->
    <g opacity="0.2" stroke="url(#cyanGrad)" stroke-width="1.5" fill="none">
      <path d="M 40 80 L 80 80 L 80 120 L 120 120"/>
      <circle cx="40" cy="80" r="3" fill="#00F0FF"/>
      <circle cx="120" cy="120" r="3" fill="#00F0FF"/>
      <path d="M 472 80 L 432 80 L 432 120 L 392 120"/>
      <circle cx="472" cy="80" r="3" fill="#00F0FF"/>
      <circle cx="392" cy="120" r="3" fill="#00F0FF"/>
      <path d="M 40 432 L 80 432 L 80 392 L 120 392"/>
      <circle cx="40" cy="432" r="3" fill="#00F0FF"/>
      <circle cx="120" cy="392" r="3" fill="#00F0FF"/>
      <path d="M 472 432 L 432 432 L 432 392 L 392 392"/>
      <circle cx="472" cy="432" r="3" fill="#00F0FF"/>
      <circle cx="392" cy="392" r="3" fill="#00F0FF"/>
    </g>

    <!-- 装饰圆环 -->
    <circle cx="256" cy="256" r="215" fill="none" stroke="url(#cyanGrad)" stroke-width="1.5" opacity="0.12"/>
    <circle cx="256" cy="256" r="200" fill="none" stroke="url(#cyanGrad)" stroke-width="1" opacity="0.08" stroke-dasharray="8 4"/>

    <!-- "予"字主体 - 清晰锐利，先画一层薄发光底 -->
    <g filter="url(#softGlow)">
      <path d="M 160 175 L 352 175 Q 362 175 362 185 L 362 222 Q 362 232 352 232 L 200 232 L 200 345 Q 200 355 210 355 L 248 355 Q 258 355 258 345 L 258 262"
            fill="none" stroke="url(#goldGrad)" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M 258 262 Q 258 252 268 252 L 312 252 Q 322 252 322 262 L 322 345 Q 322 355 312 355 L 268 355 Q 258 355 258 345"
            fill="none" stroke="url(#goldGrad)" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <!-- "予"字主体 - 清晰顶层（无滤镜，确保锐利） -->
    <g>
      <path d="M 160 175 L 352 175 Q 362 175 362 185 L 362 222 Q 362 232 352 232 L 200 232 L 200 345 Q 200 355 210 355 L 248 355 Q 258 355 258 345 L 258 262"
            fill="none" stroke="url(#goldGrad)" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M 258 262 Q 258 252 268 252 L 312 252 Q 322 252 322 262 L 322 345 Q 322 355 312 355 L 268 355 Q 258 355 258 345"
            fill="none" stroke="url(#goldGrad)" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <!-- 主体高光（白色细线，增加锐度） -->
    <g opacity="0.4">
      <path d="M 160 175 L 352 175 Q 362 175 362 185 L 362 222 Q 362 232 352 232 L 200 232 L 200 345 Q 200 355 210 355 L 248 355 Q 258 355 258 345 L 258 262"
            fill="none" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M 258 262 Q 258 252 268 252 L 312 252 Q 322 252 322 262 L 322 345 Q 322 355 312 355 L 268 355 Q 258 355 258 345"
            fill="none" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <!-- 科技节点 -->
    <g filter="url(#nodeGlow)">
      <circle cx="362" cy="185" r="6" fill="#00F0FF"/>
      <circle cx="200" cy="232" r="5" fill="#00F0FF"/>
      <circle cx="258" cy="345" r="6" fill="#00F0FF"/>
      <circle cx="322" cy="345" r="5" fill="#00F0FF"/>
    </g>

    <!-- 底部数据流汇聚 -->
    <g filter="url(#nodeGlow)">
      <path d="M 130 400 Q 180 400 230 412" fill="none" stroke="url(#cyanGrad)" stroke-width="2" opacity="0.5"/>
      <path d="M 382 400 Q 332 400 282 412" fill="none" stroke="url(#cyanGrad)" stroke-width="2" opacity="0.5"/>
      <circle cx="256" cy="418" r="9" fill="url(#cyanGrad)" opacity="0.9"/>
      <circle cx="256" cy="418" r="5" fill="#FFFFFF" opacity="0.9"/>
      <circle cx="130" cy="400" r="4" fill="url(#cyanGrad)"/>
      <circle cx="382" cy="400" r="4" fill="url(#cyanGrad)"/>
    </g>

    <!-- 顶部芯片 -->
    <g opacity="0.4">
      <rect x="238" y="96" width="36" height="36" rx="6" fill="none" stroke="url(#cyanGrad)" stroke-width="1.5"/>
      <rect x="246" y="104" width="20" height="20" rx="3" fill="url(#cyanGrad)" opacity="0.3"/>
      <line x1="238" y1="106" x2="230" y2="106" stroke="url(#cyanGrad)" stroke-width="1.5"/>
      <line x1="238" y1="122" x2="230" y2="122" stroke="url(#cyanGrad)" stroke-width="1.5"/>
      <line x1="274" y1="106" x2="282" y2="106" stroke="url(#cyanGrad)" stroke-width="1.5"/>
      <line x1="274" y1="122" x2="282" y2="122" stroke="url(#cyanGrad)" stroke-width="1.5"/>
      <line x1="246" y1="96" x2="246" y2="88" stroke="url(#cyanGrad)" stroke-width="1.5"/>
      <line x1="262" y1="96" x2="262" y2="88" stroke="url(#cyanGrad)" stroke-width="1.5"/>
      <line x1="246" y1="132" x2="246" y2="140" stroke="url(#cyanGrad)" stroke-width="1.5"/>
      <line x1="262" y1="132" x2="262" y2="140" stroke="url(#cyanGrad)" stroke-width="1.5"/>
    </g>

    <!-- 粒子 -->
    <g fill="url(#cyanGrad)" opacity="0.5">
      <circle cx="70" cy="160" r="1.5"/><circle cx="440" cy="160" r="1.5"/>
      <circle cx="50" cy="256" r="2"/><circle cx="462" cy="256" r="2"/>
      <circle cx="70" cy="352" r="1.5"/><circle cx="440" cy="352" r="1.5"/>
      <circle cx="150" cy="60" r="1"/><circle cx="362" cy="60" r="1"/>
    </g>
  </g>

  <rect x="1" y="1" width="510" height="510" rx="111" ry="111" fill="none" stroke="url(#cyanGrad)" stroke-width="2" opacity="0.3" mask="url(#roundMask)"/>
</svg>